<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion administration — {{ nom_ufr }}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/logo.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="text-center login-header">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="" class="login-logo">
        <h2>Espace administration</h2>
        <p class="login-subtitle">UFR STA — back-office</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-list">
          {% for category, message in messages %}
            <li class="flash flash--{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-field">
          <label for="username">Identifiant</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Se connecter</button>
      </form>
      <p class="login-back"><a href="{{ url_for('index') }}">&larr; Retour au site</a></p>
    </div>
  </div>
</body>
</html>
