{% extends "base.html" %}
{% block title %}Page non trouvée — {{ nom_ufr }}{% endblock %}

{% block content %}
<section class="section text-center">
  <div class="container">
    <span class="eyebrow">Erreur 404</span>
    <h1>Page introuvable</h1>
    <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <a class="btn btn--primary" href="{{ url_for('index') }}">Retour à l'accueil</a>
  </div>
</section>
{% endblock %}
